name: update marketing submodule

on:
  schedule:
    - cron: "0 9 * * 1" # mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: bump marketing to latest upstream
        run: |
          git submodule update --remote marketing
          if git diff --quiet marketing; then
            echo "already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add marketing
          git commit -m "bump marketing submodule to $(git -C marketing rev-parse --short HEAD)"
          git push
